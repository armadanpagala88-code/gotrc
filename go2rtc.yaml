  sosial2: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-dinsos.ddns.net:6560/stream1#video=h264"
  sosial1_sub: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-dinsos.ddns.net:6559/stream2#video=h264"
  sosial2_sub: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-dinsos.ddns.net:6560/stream2#video=h264"
  
