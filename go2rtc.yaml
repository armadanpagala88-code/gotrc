# go2rtc RTSP Proxy Configuration
# Semua akses CCTV melalui satu server (port 8554)
# Stream utama = stream1 (High Quality 2K/1080p)
# Stream _sub = stream2 (Low Quality HD/720p)
# ALL STREAMS USING FFmpeg TRANSCODE H.265+ -> H.264

streams:
  # LABKESDA - H.265+ with FFmpeg transcode
  labkesda1: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-labkesda2.ddns.net:6554/stream1#video=h264"
  labkesda2: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-labkesda2.ddns.net:6555/stream1#video=h264"
  labkesda1_sub: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-labkesda2.ddns.net:6554/stream2#video=h264"
  labkesda2_sub: "ffmpeg:rtsp://admin:2025-CCTVknw@cctv-labkesda2.ddns.net:6555/stream2#video=h264"
  
  # DINSOS/SOSIAL - H.265+ with FFmpeg transcode
