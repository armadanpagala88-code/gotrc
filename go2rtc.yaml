ffmpeg:
  bin: ffmpeg

api:
  listen: ":1984"
  origin: "*"
  static_dir: /static

rtsp:
  listen: ":8554"
  default_query: "video&audio"

webrtc:
  listen: ":8555/tcp"
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]

hls:
  segment_duration: 1
  playlist_size: 3

log:
  level: info
